<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List using local storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="heading">To-Do List</h1>

        <div class="input_field">
            <input type="text" class="task_detail" placeholder="Item Name">
            <input type="date" class="date">
            <select id="priority">
                <option value="">Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            <button id="main_btn">Add Item</button>
        </div>

        <h2 class="heading_small">Today's TodoList</h2>
        <div class="Today_box_container1"></div>

        <h2 class="heading_small">Future TodoList</h2>
        <div class="Today_box_container2"></div>

        <h2 class="heading_small">Completed TodoList</h2>
        <div class="Today_box_container3 complete_todo"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
